<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/colors.css">
    <link rel="stylesheet" href="styles/typography.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>
    <header class="site-head">
        <h1> <img class="site-logo" src="assets/k-Photoroom.png" alt="Site Logo"></h1>
        <div class="search-row">
            <img src="assets/search_icon.svg" alt="Search Icon">
            <input id="searchBar" type="text" placeholder="">
        </div>
        <nav>
            <a href="index.html"><img src="assets/home_28dp_E8A020_FILL0_wght400_GRAD0_opsz24.svg" alt="home"></a>
            <a href="cart.html" class="cart-icon"> <img src="assets/shopping_cart_28dp_E8A020_FILL0_wght400_GRAD0_opsz24.svg" alt="cart">
            <span id="cartCount">0</span></a>
        </nav>
    </header>
    <main>

     <section class="menu-buttons"> 
        <button class="menu-buttons">All </button>
        <button class="menu-buttons">Mains</button>
        <button class="menu-buttons">Desserts</button>
        <button class="menu-buttons">Drinks</button>

     </section>
     <section class="dish-list">

    <article class="dish-card" id="padThai">
        <img src="assets/pad thai.png" alt="Pad Thai">
        <div class="dish-details">
        <h3>Pad Thai</h3>
        <p>Mild</p>
        </div>
        <p class="dish-price">$22</p>
    </article>
         
    <article class="dish-card" id="greenCurry">
            <img src="assets/Thai Green Curry.png" alt="Thai Green Curry">
            <div class="dish-details">
                <h3>Gaeng Keow Wan</h3>
                <p>Mild</p>
            </div>
            <p class="dish-price">$25</p>
    </article>
  

    <article class="dish-card" id="padSee">
        <img src="assets/pad see e.png" alt="Pad See Ew">
        <div class="dish-details">
            <h3>Pad See Ew</h3>
            <p>Mild</p>
        </div>
        <p class="dish-price">$23</p>
    </article>
   
      
     <article class="dish-card" id="redCurry">
            <img src="assets/red curry.png" alt="Red Curry">
            <div class="dish-details">
             <h3>Red Curry</h3>
             <p>Mild</p>
            </div>
            <p class="dish-price">$25</p>
    </article>
    </section>

    <aside id="dishPanel">
       
        <button id="closePanel"> X</button>
        <img id="dishImage" src="assets/drinks page.png" alt=" DishImage">
        <h2 id="dishTitle"></h2>
        <p id="dishPrice"></p>
        <p id="dishDesc"></p>
        <div class="quan-control">
            <button onclick="decreaseQty(selectedItem)">-</button>
            <span id="selectedQty">0</span>
            <button onclick="increaseQty(selectedItem)">+</button>
        </div>

        <button id="addToOrder">Add to Order</button>
    </aside>

    </main>
    <footer class="menu-site-footer">
        <div class="footer-info">
            <img class="site-logo"  src="assets/k-Photoroom.png" alt="sitelogo">
        </div>
    
        <div class="footer-locations">
            <h3>Locations</h3>
            <p>Chelsea</p>
            <p>Williamstown</p>
        </div>
    
        <div class="footer-copy">
            <p>&copy;2026 A Day in BKK</p>
        </div>
    
    </footer>
<script src="scripts/script.js"></script>
</body>
</html>
