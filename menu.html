<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/colors.css">
    <link rel="stylesheet" href="styles/typography.css">
</head>
<body>
    <header>
        <h1>A Day In Bkk</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="cart.html">Cart</a>
        </nav>
    </header>
    <main>
     <section>
        <h2>Menu</h2>
     </section>
     <section class="menu-buttons"> 
        <button>All </button>
        <button>Mains</button>
        <button>Desserts</button>
        <button>Drinks</button>

     </section>
     <section class="dish-list">
       <article class="dish-card" id="padThai">
        <img src="assets/pad thai.png" alt="Pad Thai">
        <div class="dish-details">
        <h3>Pad Thai</h3>
        <p>Mild</p>
        </div>
        <p class="dish-price">$22</p>
    </article>
         
    <article class="dish-card" id="greenCurry">
            <img src="assets/Thai Green Curry.png" alt="Thai Green Curry">
            <div class="dish-details">
                <h3>Gaeng Keow Wan</h3>
                <p>Mild</p>
            </div>
            <p class="dish-price">$25</p>
           </article>
  


    <article class="dish-card" id="padSee">
        <img src="assets/pad see e.png" alt="Pad See Ew">
        <div class="dish-details">
            <h3>Pad See Ew</h3>
            <p>Mild</p>
        </div>
        <p class="dish-price">$23</p>
    </article>
   
      
     <article class="dish-card" id="redCurry">
            <img src="assets/red curry.png" alt="Red Curry">
            <div class="dish-details">
             <h3>Red Curry</h3>
             <p>Mild</p>
            </div>
            <p class="dish-price">$25</p>
    </article>
    </section>

    <aside id="dishPanel">
        <img id="dishImage" src="assets/drinks page.png" alt=" DishImage">
        <h2 id="dishTitle">dddd</h2>
        <p id="dishPrice">ddddd</p>
        <p id="dishDesc"> </p>
        

    </aside>


     <footer class="site-footer">
        <div class="footer-info">
            <h3>A day in BKK</h3>
            <p>The story of Thai cuisine</p>
        </div>
    
        <div class="footer-locations">
            <h3>Locations</h3>
            <p>Chelsea</p>
            <p>Williamstown</p>
        </div>
    
        <div class="footer-copy">
            <p>&copy;2026 A Day in BKK</p>
        </div>
    
    </footer>
    </main>
<script src="scripts/script.js"></script>
</body>
</html>
