<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title> 
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/colors.css">
    <link rel="stylesheet" href="styles/typography.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
</head>
<body>
    <header>
   <h1>A Day In Bkk</h1>
    </header>
    <main class="checkout-page">
        <div class="checkout-card">
        <h2 class="checkout-title">1. YOUR DETAILS </h2>
         <form class="checkout-form">
            <div class="form-entry">
            <label for="fname">First Name:</label>
            <input type="text" id="fname" name="fname">
            </div>
            <div class="form-entry">
            <label for="lname">Last Name:</label>
            <input type="text" id="lname"name="lname">
            </div>
            <div class="form-entry">
                <label for="pnumber">Phone Number:</label>
                <input type="tel" name="pnumber" id="pnumber">
            </div>
            
            <div class="form-entry">
                <label for="email">Email:</label>
                <input type="email" name="email" id="email">
            </div>
         </form>
          
         <div class="checkout-type">
         <h2 class="checkout-title">2. ORDER TYPE</h2>
         <label> <input type="radio" name="ordertype" value="dinein">Dine In</label> 
         <label> <input type="radio" name="ordertype" value="takeaway">Takeaway</label> 
         <h2 class="checkout-title">3. LOCATIONS </h2>
         <label> <input type="radio" name="locations" value="chelsea">Chelsea</label> 
         <label > <input type="radio" name="locations" value="williamstown">Williamstown</label> 
         
        </div>

        </div>

         <div class="order-summary"> 
           <h3>Order Summary</h3>
           <p>Subtotal</p>
           <h4>Total</h4>
           <button class="checkout-btn">Place Order</button> 
         </div>
    </main>
<script src="scripts/script.js"> </script>
</body>
</html>
